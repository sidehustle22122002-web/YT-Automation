name: DarkHistoryMind Daily Shorts Pipeline

on:
  schedule:
    # Run every day at 10:00 UTC (3:30 PM IST)
    # This triggers once per day, generates and uploads 4 shorts
    - cron: '0 10 * * *'
  
  workflow_dispatch:  # Manual trigger backup

jobs:
  daily-shorts:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libsm6 libxext6 libxrender-dev fonts-liberation
          sudo fc-cache -fv

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install moviepy groq requests pillow numpy opencv-python edge-tts gspread google-auth-oauthlib google-auth-httplib2 google-api-python-client

      - name: Download credentials from Google Drive
        env:
          GDRIVE_SECRETS_ID: ${{ secrets.GDRIVE_SECRETS_ID }}
          GDRIVE_TOKEN_ID: ${{ secrets.GDRIVE_TOKEN_ID }}
        run: |
          python << 'PYTHON_EOF'
          import requests
          import os
          
          files = [
              ("client_secrets.json", os.environ.get("GDRIVE_SECRETS_ID", "")),
              ("youtube_token.pkl", os.environ.get("GDRIVE_TOKEN_ID", "")),
          ]
          
          for name, file_id in files:
              if not file_id:
                  print(f"⚠️ {name} file ID not set")
                  continue
              url = f"https://drive.google.com/uc?export=download&id={file_id}"
              try:
                  r = requests.get(url, timeout=60)
                  if r.status_code == 200:
                      with open(name, "wb") as f:
                          f.write(r.content)
                      print(f"✅ Downloaded {name}")
                  else:
                      print(f"❌ Failed to download {name}: {r.status_code}")
              except Exception as e:
                  print(f"❌ Error downloading {name}: {e}")
          PYTHON_EOF

      - name: Run Daily Shorts Pipeline
        env:
          GROQ_KEY: ${{ secrets.GROQ_KEY }}
          PEXELS_KEY: ${{ secrets.PEXELS_KEY }}
          PIXABAY_KEY: ${{ secrets.PIXABAY_KEY }}
          GDRIVE_SECRETS_ID: ${{ secrets.GDRIVE_SECRETS_ID }}
          GDRIVE_TOKEN_ID: ${{ secrets.GDRIVE_TOKEN_ID }}
          GDRIVE_MUSIC_ID: ${{ secrets.GDRIVE_MUSIC_ID }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
        run: |
          python shorts_pipeline.py

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: daily-shorts-logs-${{ github.run_number }}
          path: shorts_pipeline.log
          retention-days: 30

      - name: Show logs on failure
        if: failure()
        run: |
          echo "❌ Pipeline failed!"
          if [ -f shorts_pipeline.log ]; then
            echo "--- Last 150 lines of log ---"
            tail -150 shorts_pipeline.log
          fi
